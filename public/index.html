<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>任務管理系統</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <link rel="stylesheet" href="calendar.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

  <!-- Start 選擇畫面 -->
  <div id="start-screen" class="w-full max-w-sm space-y-4 text-center">
    <h1 class="text-2xl font-bold mb-4">歡迎使用任務管理系統</h1>
    <button onclick="showScreen('register-screen')" class="w-full px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">註冊</button>
    <button onclick="showScreen('login-screen')" class="w-full px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600">登入</button>
  </div>

  <!-- 註冊畫面 -->
  <div id="register-screen" class="hidden w-full max-w-sm bg-white p-6 rounded shadow space-y-4">
    <h2 class="text-xl font-bold text-center">註冊帳號</h2>
    <input type="text" id="register-username" placeholder="使用者名稱" class="w-full border p-2 rounded"/>
    <input type="password" id="register-password" placeholder="密碼" class="w-full border p-2 rounded"/>
    <button onclick="handleRegister()" class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600">註冊</button>
  </div>

  <!-- 登入畫面 -->
  <div id="login-screen" class="hidden w-full max-w-sm bg-white p-6 rounded shadow space-y-4">
    <h2 class="text-xl font-bold text-center">登入帳號</h2>
    <input type="text" id="login-username" placeholder="使用者名稱" class="w-full border p-2 rounded"/>
    <input type="password" id="login-password" placeholder="密碼" class="w-full border p-2 rounded"/>
    <button onclick="handleLogin()" class="w-full bg-green-500 text-white py-2 rounded hover:bg-green-600">登入</button>
  </div>

  <!-- 任務介面 -->
  <div id="task-screen" class="hidden w-full max-w-2xl">
    <!-- 清單模式顯示區 -->
    <div id="list-view" class="hidden">
      <div class="bg-white p-6 rounded shadow mb-6">
        <h2 class="text-xl font-bold mb-4">新增任務</h2>
        <form id="task-form" class="space-y-4">
          <input type="text" id="title" name="title" placeholder="標題" required class="w-full border p-2 rounded"/>
          <textarea id="description" name="description" placeholder="描述" class="w-full border p-2 rounded"></textarea>
          <input type="datetime-local" id="due_date" name="due_date" class="w-full border p-2 rounded"/>
          
          <!-- 地點設定區塊 -->
          <div class="space-y-2">
            <label class="flex items-center space-x-2">
              <input type="checkbox" id="enable-location" class="w-4 h-4">
              <span>指定任務地點</span>
            </label>
            <div id="location-fields" class="hidden">
              <label for="location_name">地點名稱</label>
              <input type="text" id="location_name" name="location_name" placeholder="為地點命名">
              <div id="map" style="height: 300px;"></div>
            </div>
          </div>
          
          <!-- 隱藏欄位儲存經緯度 -->
          <input type="hidden" id="latitude" name="latitude">
          <input type="hidden" id="longitude" name="longitude">
          
          <!-- 提交任務按鈕 -->
          <button type="submit" class="w-full bg-purple-500 text-white py-2 rounded hover:bg-purple-600">提交</button>
        </form>     
      </div>

      <div class="bg-white p-6 rounded shadow">
        <h2 class="text-xl font-bold mb-4">任務列表</h2>
        <ul id="tasks-list" class="space-y-2"></ul>
      </div>
    </div>

    <!-- 月曆模式顯示區 -->
    <div id="calendar-view">
      <div class="bg-white p-6 rounded shadow">
        <h2 class="text-xl font-bold mb-4">任務行事曆</h2>
        <button id="switch-to-view" class="text-gray-700 hover:text-blue-600 px-2 py-1">
          📅瀏覽
        </button>
        <button id="switch-to-add" class="text-gray-700 hover:text-blue-600 px-2 py-1">
          ✏️編輯
        </button>
        <div id="calendar" class="w-full h-[600px] rounded shadow border"></div>
      </div>
    </div>
    <button id="mode-toggle-btn" class="px-4 py-2 bg-purple-500 text-white rounded hover:bg-purple-600">
        清單模式
    </button>
  </div>
  
    

  <script src="auth.js"></script>
  <script src="tasks.js"></script>
  <script src="location.js"></script>
  <script src="calendar.js"></script> 
  
  <script>
    // 取得 DOM 元素
    const toggleButton = document.getElementById('mode-toggle-btn');
      const listView = document.getElementById('list-view');
      const calendarView = document.getElementById('calendar-view');

      // 初始顯示月曆模式
      let isListView = false; // 默認顯示月曆視圖

      // 按鈕點擊事件：切換模式
      toggleButton.addEventListener('click', () => {
        isListView = !isListView; // 反轉視圖狀態

        if (isListView) {
          listView.style.display = 'block';  // 顯示清單模式
          calendarView.style.display = 'none';  // 隱藏月曆模式
          toggleButton.textContent = '月曆模式';  // 改變按鈕文字
        } else {
          listView.style.display = 'none';  // 隱藏清單模式
          calendarView.style.display = 'block';  // 顯示月曆模式
          toggleButton.textContent = '清單模式';  // 改變按鈕文字
        }
      });
  </script> 
</body>

</html>
